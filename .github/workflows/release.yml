name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # Create GitHub release
  id-token: write   # OIDC token for npm Trusted Publishers
  attestations: write # npm provenance attestations

jobs:
  release:
    name: Release & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Z3 solver
        run: |
          sudo apt-get update
          sudo apt-get install -y z3

      - name: Install dependencies
        run: npm ci

      - name: Run full CI validation
        run: npm run ci

      - name: Publish to npm
        id: npm_publish
        run: |
          npm config delete //registry.npmjs.org/:_authToken
          npm publish --provenance --access public --ignore-scripts
        continue-on-error: true

      - name: Check npm publish result
        if: steps.npm_publish.outcome == 'failure'
        run: |
          echo "::warning::npm publish failed. If this version was already published manually, this is expected for the first release."

      - name: Extract release notes from RELEASE_NOTES.md
        id: release_notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## v${VERSION}/{p=1; next} p && /^## v[0-9]/{exit} p{print}" RELEASE_NOTES.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            dist/*.js
            dist/*.cjs
            dist/*.d.ts
